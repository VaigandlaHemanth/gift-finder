<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Mumzworld AI Gift Finder - Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&amp;family=Quicksand:wght@500;700&amp;family=Inter:ital,wght@0,400;0,500;1,400&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#E91E63",
            background: "#FAFAFA",
            surface: "rgba(255, 255, 255, 0.78)",
            text: {
              main: "#1A1A1A",
              muted: "#6F6F76"
            },
            accent: "#FCE4EC",
            border: "#F7BBD0",
            json: {
              bg: "#1E1E1E",
              string: "#A6E22E",
              key: "#F92672",
              punctuation: "#F8F8F2"
            }
          },
          fontFamily: {
            serif: ["Playfair Display", "serif"],
            sans: ["Quicksand", "sans-serif"],
            ui: ["Inter", "sans-serif"],
            mono: ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
          },
          boxShadow: {
            ambient: "0 12px 40px rgba(233, 30, 99, 0.10)",
            drawer: "0 -4px 24px rgba(233, 30, 99, 0.12)"
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: "Inter", sans-serif; background: #FAFAFA; }
    h1, h2, h3 { font-family: "Playfair Display", serif; }
    .font-sans-round { font-family: "Quicksand", sans-serif; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] .chevron { transform: rotate(180deg); }
    .chevron { transition: transform 0.25s ease; }
  </style>
</head>
<body class="min-h-screen text-text-main pb-48">
  <main class="mx-auto flex w-full max-w-6xl flex-col gap-8 px-4 py-8 sm:px-6 lg:px-8">
    <header class="flex flex-col gap-5 sm:flex-row sm:items-center sm:justify-between">
      <a class="inline-flex items-center gap-2 text-sm font-medium text-text-muted hover:text-primary" href="/">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        New search
      </a>
      <form class="flex w-full max-w-2xl items-center gap-2 rounded-[20px] border border-accent bg-white/80 p-2 shadow-ambient" id="search-form">
        <input autocomplete="off" class="min-w-0 flex-1 border-none bg-transparent px-3 text-base text-text-main placeholder:text-text-muted focus:ring-0" id="query-input" placeholder="Describe the gift..." type="text"/>
        <button class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-primary text-white transition hover:opacity-90" type="submit" aria-label="Find gifts">
          <span class="material-symbols-outlined text-[20px]">search</span>
        </button>
      </form>
    </header>

    <section class="flex flex-col gap-3">
      <p class="text-sm font-medium uppercase tracking-[0.12em] text-primary">Mumzworld AI Gift Finder</p>
      <h1 class="text-[36px] font-semibold leading-tight sm:text-[52px]">Curated matches</h1>
      <p class="max-w-3xl text-lg leading-8 text-text-muted" id="query-line"></p>
    </section>

    <section class="rounded-[24px] border border-accent bg-surface p-5 shadow-ambient backdrop-blur-xl" id="understanding-section">
      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <p class="mb-2 text-xs font-semibold uppercase tracking-[0.12em] text-text-muted">Understood as</p>
          <p class="text-base leading-7" id="understood-en">Loading...</p>
        </div>
        <div dir="rtl">
          <p class="mb-2 text-xs font-semibold uppercase tracking-[0.12em] text-text-muted">الفهم بالعربية</p>
          <p class="text-base leading-7" id="understood-ar">...</p>
        </div>
      </div>
    </section>

    <section class="grid gap-4 md:grid-cols-3" id="meta-grid"></section>

    <section class="grid gap-5 md:grid-cols-2 xl:grid-cols-3" id="results-grid"></section>

  </main>

  <div class="fixed bottom-0 left-0 z-50 w-full">
    <details class="group w-full overflow-hidden rounded-t-[24px] border-t border-accent bg-white/90 shadow-drawer backdrop-blur-[24px]">
      <summary class="flex h-12 w-full cursor-pointer items-center justify-center gap-2 text-xs font-medium text-text-muted transition hover:bg-black/5">
        See how the AI thought
        <span class="material-symbols-outlined chevron text-[16px]">expand_more</span>
      </summary>
      <div class="mx-auto grid max-h-[330px] w-full max-w-6xl gap-6 overflow-y-auto border-t border-accent/70 px-6 py-5 md:grid-cols-2">
        <div>
          <h3 class="mb-4 font-sans-round text-lg font-bold">Decision Matrix</h3>
          <div class="rounded-[16px] border border-accent bg-white/70 p-4" id="decision-matrix"></div>
        </div>
        <div>
          <h3 class="mb-4 font-sans-round text-lg font-bold">Raw Validated JSON</h3>
          <pre class="max-h-[240px] overflow-auto rounded-[16px] bg-json-bg p-4 font-mono text-xs leading-6 text-json-punctuation" id="raw-json">{}</pre>
        </div>
      </div>
    </details>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const initialQuery = params.get("q") || "";
    const queryInput = document.getElementById("query-input");
    const queryLine = document.getElementById("query-line");
    const form = document.getElementById("search-form");
    const resultsGrid = document.getElementById("results-grid");
    const metaGrid = document.getElementById("meta-grid");
    const rawJson = document.getElementById("raw-json");
    const decisionMatrix = document.getElementById("decision-matrix");

    queryInput.value = initialQuery;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function confidenceColor(confidence) {
      if (confidence >= 0.75) return "text-[#18864B]";
      if (confidence >= 0.55) return "text-[#A66A00]";
      return "text-[#B42318]";
    }

    function metaCard(label, value) {
      return `
        <div class="rounded-[20px] border border-accent bg-white/75 p-4 shadow-ambient">
          <p class="text-xs font-semibold uppercase tracking-[0.12em] text-text-muted">${label}</p>
          <p class="mt-2 text-lg font-semibold">${escapeHtml(value)}</p>
        </div>
      `;
    }

    function renderDecisionMatrix(result) {
      const confidences = (result.recommendations || []).map((item) => item.confidence || 0);
      const avgConfidence = confidences.length
        ? confidences.reduce((sum, value) => sum + value, 0) / confidences.length
        : 0;
      const rows = [
        ["Language", result.language_detected || "unknown"],
        ["Budget", result.budget_extracted ? `${result.budget_extracted} AED` : "unknown"],
        ["Age", result.age_months_extracted !== null && result.age_months_extracted !== undefined ? `${result.age_months_extracted} months` : "unknown"],
        ["Behavior", result.out_of_scope ? "refusal" : "recommendation"],
        ["Avg Confidence", confidences.length ? `${Math.round(avgConfidence * 100)}%` : "not applicable"],
        ["Uncertainty Note", result.uncertainty_note_en ? "present" : "not needed"]
      ];
      decisionMatrix.innerHTML = rows.map(([label, value]) => `
        <div class="flex items-center justify-between border-b border-accent/60 py-2 last:border-b-0">
          <span class="text-sm text-text-muted">${label}</span>
          <span class="font-mono text-sm font-semibold">${escapeHtml(value)}</span>
        </div>
      `).join("");
    }

    function renderResult(result) {
      document.getElementById("understood-en").textContent = result.query_understood_en || "";
      document.getElementById("understood-ar").textContent = result.query_understood_ar || "";
      rawJson.textContent = JSON.stringify(result, null, 2);
      renderDecisionMatrix(result);

      metaGrid.innerHTML = [
        metaCard("Language", result.language_detected === "ar" ? "Arabic" : "English"),
        metaCard("Budget", result.budget_extracted ? `${result.budget_extracted} AED` : "Not specified"),
        metaCard("Age", result.age_months_extracted !== null && result.age_months_extracted !== undefined ? `${result.age_months_extracted} months` : "Not specified")
      ].join("");

      if (result.out_of_scope) {
        resultsGrid.innerHTML = `
          <article class="md:col-span-2 xl:col-span-3 rounded-[24px] border border-accent bg-white p-8 shadow-ambient">
            <p class="mb-3 text-sm font-semibold uppercase tracking-[0.12em] text-primary">No confident answer</p>
            <h2 class="mb-4 text-3xl font-semibold">I do not know enough to recommend a gift for this request.</h2>
            <p class="max-w-3xl leading-8 text-text-muted">${escapeHtml(result.uncertainty_note_en || "Try adding the baby age, budget, or occasion.")}</p>
            <p class="mt-4 max-w-3xl leading-8 text-text-muted" dir="rtl">${escapeHtml(result.uncertainty_note_ar || "")}</p>
          </article>
        `;
        return;
      }

      resultsGrid.innerHTML = (result.recommendations || []).map((item) => {
        const confidence = Math.round((item.confidence || 0) * 100);
        return `
          <article class="flex min-h-[360px] flex-col rounded-[24px] border border-accent bg-white p-5 shadow-ambient">
            <div class="mb-5 flex items-start justify-between gap-4">
              <div>
                <p class="mb-2 text-xs font-semibold uppercase tracking-[0.12em] text-primary">${escapeHtml(item.category_en)}</p>
                <h2 class="font-sans-round text-xl font-bold leading-7">${escapeHtml(item.product_name_en)}</h2>
                <p class="mt-2 text-sm leading-6 text-text-muted" dir="rtl">${escapeHtml(item.product_name_ar)}</p>
              </div>
              <div class="shrink-0 rounded-full bg-primary px-3 py-1 text-sm font-bold text-white">${escapeHtml(item.price_aed)} AED</div>
            </div>
            <div class="mb-4 flex flex-wrap gap-2 text-sm">
              <span class="rounded-full bg-accent px-3 py-1">${escapeHtml(item.age_suitability)}</span>
              <span class="rounded-full bg-accent px-3 py-1">${item.in_stock ? "In stock" : "Out of stock"}</span>
              <span class="rounded-full bg-accent px-3 py-1 ${confidenceColor(item.confidence)}">${confidence}% match</span>
            </div>
            <p class="leading-7 text-text-main">${escapeHtml(item.reason_en)}</p>
            <p class="mt-4 leading-7 text-text-muted" dir="rtl">${escapeHtml(item.reason_ar)}</p>
          </article>
        `;
      }).join("");
    }

    async function loadResults(query) {
      queryLine.textContent = query ? `Query: "${query}"` : "No query entered.";
      resultsGrid.innerHTML = `
        <article class="md:col-span-2 xl:col-span-3 rounded-[24px] border border-accent bg-white p-8 shadow-ambient">
          <p class="text-lg font-semibold">Finding grounded recommendations...</p>
          <p class="mt-2 text-text-muted">The first run can take a moment while local embeddings load.</p>
        </article>
      `;

      try {
        const response = await fetch("/api/find", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.detail || "Request failed");
        renderResult(payload);
      } catch (error) {
        resultsGrid.innerHTML = `
          <article class="md:col-span-2 xl:col-span-3 rounded-[24px] border border-[#F2C94C] bg-[#FFF8DC] p-8 shadow-ambient">
            <p class="mb-3 text-sm font-semibold uppercase tracking-[0.12em] text-[#8A6D00]">Setup needed</p>
            <h2 class="mb-4 text-3xl font-semibold">The backend could not complete the request.</h2>
            <p class="leading-8 text-text-muted">${escapeHtml(error.message)}</p>
          </article>
        `;
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const query = queryInput.value.trim();
      window.history.pushState({}, "", `/results?q=${encodeURIComponent(query)}`);
      loadResults(query);
    });

    loadResults(initialQuery);
  </script>
</body>
</html>
